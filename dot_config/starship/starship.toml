"$schema" = 'https://starship.rs/config-schema.json'
command_timeout = 1000
format = """
[Óā∂](color_orange)\
$os\
$username\
[Óāį](bg:color_yellow fg:color_orange)\
$directory\
[Óāį](fg:color_yellow bg:color_aqua)\
$git_branch\
$git_status\
[Óāį](fg:color_aqua bg:color_blue)\
$c\
$cpp\
$ruby\
$golang\
$nodejs\
$php\
$java\
$kotlin\
$haskell\
$python\
$swift\
[Óāį](fg:color_blue bg:color_bg3)\
$docker_context\
$conda\
$pixi\
[Óāį](fg:color_bg3 bg:color_bg1)\
$time\
[Óāī ](fg:color_bg1)\
$line_break$character"""

palette = 'gruvbox_dark'

[palettes.gruvbox_dark]
color_fg0 = '#FFFFFF'
color_bg1 = '#3c3836'
color_bg3 = '#665c54'
color_blue = '#909692'
color_aqua = '#212183'
color_green = '#212183'
color_orange = '#0527FC'
color_purple = '#3D45AA'
color_red = '#3094FF'
color_yellow = '#1A61FE'


[os]
disabled = false
style = "bg:color_orange fg:color_fg0"

[os.symbols]
Ubuntu = "ůįēą"
Raspbian = "ůįźŅ"
Macos = "ůįÄĶ"


[username]
show_always = true
style_user = "bg:color_orange fg:color_fg0"
style_root = "bg:color_orange fg:color_fg0"
format = '[ $user ]($style)'

[directory]
style = "fg:color_fg0 bg:color_yellow"
format = "[ $path ]($style)"
truncation_length = 3
truncation_symbol = "‚Ä¶/"

[directory.substitutions]
"Documents" = "ůįąô "
"Downloads" = "ÔÄô "
"Music" = "ůįĚö "
"Pictures" = "ÔÄĺ "
"Developer" = "ůį≤č "

[git_branch]
symbol = "Ôźė"
style = "bg:color_aqua"
format = '[[ $symbol $branch ](fg:color_fg0 bg:color_aqua)]($style)'

[git_status]
style = "bg:color_aqua"
format = '[[($all_status$ahead_behind )](fg:color_fg0 bg:color_aqua)]($style)'

[nodejs]
symbol = "Óīć"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[c]
symbol = "Óėě "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[cpp]
symbol = "ÓėĚ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[ruby]
symbol = "ÓúĻ "
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
detect_files = ['Gemfile', '.ruby-version', 'Rakefile', '*.gemspec']
detect_extensions = ['rb']
detect_folders = ['.bundle']

[golang]
symbol = "Óėß"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[php]
symbol = "Óėą"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[java]
symbol = "ÓČĖ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[kotlin]
symbol = "Óėī"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[haskell]
symbol = "Óėü"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[python]
symbol = "ÓėÜ"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'

[swift]
symbol = "Óöô"
style = "bg:color_blue"
format = '[[ $symbol( $version) ](fg:color_fg0 bg:color_blue)]($style)'
detect_files = ['Package.swift', '*.swift']
detect_folders = ['.build']
detect_extensions = ['swift']

[docker_context]
symbol = "ÔĆą"
style = "bg:color_bg3"
format = '[[ $symbol( $context) ](fg:#83a598 bg:color_bg3)]($style)'

[conda]
style = "bg:color_bg3"
format = '[[ $symbol( $environment) ](fg:#83a598 bg:color_bg3)]($style)'

[pixi]
style = "bg:color_bg3"
format = '[[ $symbol( $version)( $environment) ](fg:color_fg0 bg:color_bg3)]($style)'

[time]
disabled = false
time_format = "%R"
style = "bg:color_bg1"
format = '[[ Ôźļ $time ](fg:color_fg0 bg:color_bg1)]($style)'

[line_break]
disabled = true

[character]
disabled = true
success_symbol = '[Ôź≤](bold fg:color_green)'
error_symbol = '[Ôź≤](bold fg:color_red)'
vimcmd_symbol = '[Ôźī](bold fg:color_green)'
vimcmd_replace_one_symbol = '[Ôźī](bold fg:color_purple)'
vimcmd_replace_symbol = '[Ôźī](bold fg:color_purple)'
vimcmd_visual_symbol = '[Ôźī](bold fg:color_yellow)'
